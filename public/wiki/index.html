<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tank Game Wiki</title>
  <link rel="icon" href="/assets/favicon/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Back to game">
      <span class="brand-dot" aria-hidden="true"></span>
      Tank&nbsp;Game
    </a>
    <nav class="site-nav">
      <a class="nav-link" href="/">Play</a>
      <a class="nav-link nav-primary" href="/wiki">Wiki</a>
    </nav>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="Wiki navigation">
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search wiki…" autocomplete="off" />
      </div>
      <nav id="wiki-nav"></nav>
    </aside>

    <article class="content">
      <h1 id="page-title">Loading…</h1>
      <div id="page-meta"></div>
      <div id="page-body" class="prose"></div>
    </article>
  </main>

  <script src="./docs.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    }

    function md(s = '') {
      return s
        .replace(/^### (.*)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*)$/gm, '<h1>$1</h1>')
        .replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${escapeHtml(code)}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr>')
        .replace(/^- (.*)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/^/, '<p>').replace(/$/, '</p>');
    }

    function buildNav() {
      const nav = $('wiki-nav');
      nav.innerHTML = '';
      DOCS.nav.forEach(group => {
        const section = document.createElement('div');
        section.className = 'nav-group';
        section.innerHTML = `<div class="nav-group-title">${group.label}</div>`;
        const list = document.createElement('div');
        list.className = 'nav-group-list';
        group.items.forEach(item => {
          const a = document.createElement('a');
          a.className = 'nav-item';
          a.href = `#/${item.slug}`;
          a.textContent = item.label;
          list.appendChild(a);
        });
        section.appendChild(list);
        nav.appendChild(section);
      });
    }

    function render(slug) {
      const page = DOCS.pages[slug] || DOCS.pages['overview'];
      document.title = page.title + ' · Tank Game Wiki';
      $('page-title').textContent = page.title;
      $('page-meta').innerHTML = page.meta ? `<div class="meta-row">${page.meta}</div>` : '';
      $('page-body').innerHTML = md(page.body || '');
      document.querySelector('.content').scrollTop = 0;
      highlightActive(slug);
    }

    function highlightActive(slug) {
      document.querySelectorAll('.nav-item').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === `#/${slug}`);
      });
    }

    function search(q) {
      const s = q.trim().toLowerCase();
      document.querySelectorAll('.nav-item').forEach(a => {
        const slug = a.getAttribute('href').slice(2);
        const p = DOCS.pages[slug];
        const hay = (p.title + ' ' + (p.body || '')).toLowerCase();
        a.style.display = (!s || hay.includes(s)) ? '' : 'none';
      });
    }

    function route() {
      const slug = location.hash.replace(/^#\//, '') || 'overview';
      render(slug);
    }

    buildNav();
    window.addEventListener('hashchange', route);
    route();
    $('search').addEventListener('input', e => search(e.target.value));
  </script>
</body>
</html>
